<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Node Glow Effects -->
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* CSS Animations */
    @keyframes flowLeft {
      to {
        stroke-dashoffset: -40;
      }
    }
    @keyframes flowRight {
      to {
        stroke-dashoffset: 40;
      }
    }
    @keyframes spinGear {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
    @keyframes pulseNode {
      0%, 100% {
        transform: scale(1);
        opacity: 0.9;
      }
      50% {
        transform: scale(1.05);
        opacity: 1;
      }
    }

    /* Element Styling */
    .bg {
      fill: url(#bgGrad);
      stroke: #1f2937;
      stroke-width: 2;
      rx: 16px;
    }
    .grid-lines {
      stroke: #1f2937;
      stroke-width: 1;
      stroke-dasharray: 4, 12;
      opacity: 0.4;
    }
    .flow-line-in {
      fill: none;
      stroke: #3b82f6;
      stroke-width: 2;
      stroke-dasharray: 6, 8;
      animation: flowLeft 2s linear infinite;
      opacity: 0.8;
    }
    .flow-line-out-dw {
      fill: none;
      stroke: #10b981;
      stroke-width: 2;
      stroke-dasharray: 6, 8;
      animation: flowRight 2s linear infinite;
      opacity: 0.8;
    }
    .flow-line-out-bi {
      fill: none;
      stroke: #f59e0b;
      stroke-width: 2;
      stroke-dasharray: 6, 8;
      animation: flowRight 2s linear infinite;
      opacity: 0.8;
    }
    .connection-line {
      fill: none;
      stroke: #374151;
      stroke-width: 2;
      opacity: 0.4;
    }
    .gear {
      transform-origin: 400px 130px;
      animation: spinGear 10s linear infinite;
    }
    .node-center {
      transform-origin: 400px 130px;
      animation: pulseNode 3s ease-in-out infinite;
    }
    .node-glow {
      transition: all 0.3s ease;
    }
    .node-text {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 600;
      fill: #9ca3af;
      text-anchor: middle;
    }
    .title-text {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      fill: #e5e7eb;
      text-anchor: middle;
    }
    .category-title {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2px;
      text-anchor: middle;
    }
  </style>

  <!-- Background Card -->
  <rect class="bg" width="800" height="280" />

  <!-- Decorative Grid Lines -->
  <line class="grid-lines" x1="0" y1="70" x2="800" y2="70" />
  <line class="grid-lines" x1="0" y1="130" x2="800" y2="130" />
  <line class="grid-lines" x1="0" y1="190" x2="800" y2="190" />
  <line class="grid-lines" x1="200" y1="0" x2="200" y2="280" />
  <line class="grid-lines" x1="600" y1="0" x2="600" y2="280" />

  <!-- Column Header Labels -->
  <text class="category-title" x="100" y="35" fill="#3b82f6">EXTRACT (SOURCES)</text>
  <text class="category-title" x="400" y="35" fill="#d946ef">TRANSFORM (ENGINE)</text>
  <text class="category-title" x="700" y="35" fill="#10b981">LOAD (DESTINATIONS)</text>

  <!-- Connection Lines (Static Background) -->
  <path class="connection-line" d="M 120 70 Q 260 70, 400 130" />
  <path class="connection-line" d="M 120 130 Q 260 130, 400 130" />
  <path class="connection-line" d="M 120 190 Q 260 190, 400 130" />
  <path class="connection-line" d="M 400 130 Q 550 80, 680 80" />
  <path class="connection-line" d="M 400 130 Q 550 180, 680 180" />

  <!-- Flowing Data Particles (Animated) -->
  <path class="flow-line-in" d="M 120 70 Q 260 70, 400 130" />
  <path class="flow-line-in" d="M 120 130 Q 260 130, 400 130" />
  <path class="flow-line-in" d="M 120 190 Q 260 190, 400 130" />
  <path class="flow-line-out-dw" d="M 680 80 Q 550 80, 400 130" />
  <path class="flow-line-out-bi" d="M 680 180 Q 550 180, 400 130" />

  <!-- ==================== LEFT NODE 1: API / WEB ==================== -->
  <g transform="translate(100, 70)">
    <circle cx="0" cy="0" r="18" fill="#1e1b4b" stroke="#3b82f6" stroke-width="2" filter="url(#glowBlue)" class="node-glow" />
    <!-- Cloud Icon -->
    <path d="M-6 2 a3 3 0 0 1 0 -6 a4 4 0 0 1 7 -2 a3.5 3.5 0 0 1 1 7 z" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linejoin="round" />
    <text class="node-text" x="0" y="32">Web APIs / JSON</text>
  </g>

  <!-- ==================== LEFT NODE 2: RELATIONAL DB ==================== -->
  <g transform="translate(100, 130)">
    <circle cx="0" cy="0" r="18" fill="#1e1b4b" stroke="#3b82f6" stroke-width="2" filter="url(#glowBlue)" class="node-glow" />
    <!-- Database Icon -->
    <ellipse cx="0" cy="-4" rx="7" ry="3" fill="none" stroke="#60a5fa" stroke-width="1.5" />
    <path d="M-7 -4 v8 c0 1.5 3 3 7 3 s7 -1.5 7 -3 v-8" fill="none" stroke="#60a5fa" stroke-width="1.5" />
    <path d="M-7 0 c0 1.5 3 3 7 3 s7 -1.5 7 -3" fill="none" stroke="#60a5fa" stroke-width="1.5" />
    <text class="node-text" x="0" y="32">SQL Databases</text>
  </g>

  <!-- ==================== LEFT NODE 3: FILES / LOGS ==================== -->
  <g transform="translate(100, 190)">
    <circle cx="0" cy="0" r="18" fill="#1e1b4b" stroke="#3b82f6" stroke-width="2" filter="url(#glowBlue)" class="node-glow" />
    <!-- File Icon -->
    <path d="M-5 -7 h6 l4 4 v10 h-10 z" fill="none" stroke="#60a5fa" stroke-width="1.5" />
    <path d="M1 -7 v4 h4" fill="none" stroke="#60a5fa" stroke-width="1.5" />
    <text class="node-text" x="0" y="32">Raw Logs / Files</text>
  </g>

  <!-- ==================== CENTER ENGINE: DATABRICKS / SYNAPSE ==================== -->
  <g class="node-center">
    <!-- Outer Glow ring -->
    <circle cx="400" cy="130" r="38" fill="none" stroke="#d946ef" stroke-width="1.5" stroke-dasharray="8, 6" opacity="0.6" />
    <circle cx="400" cy="130" r="30" fill="#2e1065" stroke="#d946ef" stroke-width="3" filter="url(#glowPurple)" />
    <!-- Rotating Gear inside -->
    <g class="gear">
      <circle cx="400" cy="130" r="10" fill="none" stroke="#f472b6" stroke-width="2" />
      <path d="M 400 116 L 400 120 M 400 140 L 400 144 M 386 130 L 390 130 M 410 130 L 414 130 M 390 120 L 393 123 M 407 137 L 410 140 M 390 140 L 393 137 M 407 123 L 410 120" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round" />
    </g>
    <!-- Label -->
    <text class="node-text" x="400" y="185" fill="#f472b6">Azure Databricks</text>
    <text class="node-text" x="400" y="198" fill="#a78bfa" style="font-size: 9px;">&amp; Synapse Engine</text>
  </g>

  <!-- ==================== RIGHT NODE 1: SYNAPSE DATA WAREHOUSE ==================== -->
  <g transform="translate(700, 80)">
    <circle cx="0" cy="0" r="18" fill="#064e3b" stroke="#10b981" stroke-width="2" filter="url(#glowGreen)" class="node-glow" />
    <!-- Server Stack Icon -->
    <rect x="-7" y="-8" width="14" height="4" rx="1" fill="none" stroke="#34d399" stroke-width="1.5" />
    <rect x="-7" y="-2" width="14" height="4" rx="1" fill="none" stroke="#34d399" stroke-width="1.5" />
    <rect x="-7" y="4" width="14" height="4" rx="1" fill="none" stroke="#34d399" stroke-width="1.5" />
    <!-- Connection dots on servers -->
    <circle cx="-3" cy="-6" r="0.7" fill="#34d399" />
    <circle cx="-3" cy="0" r="0.7" fill="#34d399" />
    <circle cx="-3" cy="6" r="0.7" fill="#34d399" />
    <text class="node-text" x="0" y="32">Synapse DWH</text>
  </g>

  <!-- ==================== RIGHT NODE 2: POWER BI / REPORTS ==================== -->
  <g transform="translate(700, 180)">
    <circle cx="0" cy="0" r="18" fill="#78350f" stroke="#d97706" stroke-width="2" filter="url(#glowOrange)" class="node-glow" />
    <!-- Bar Chart / Dashboard Icon -->
    <rect x="-7" y="-6" width="3" height="12" fill="#fbbf24" />
    <rect x="-2" y="-1" width="3" height="7" fill="#fbbf24" />
    <rect x="3" y="-10" width="3" height="16" fill="#fbbf24" />
    <text class="node-text" x="0" y="32">Power BI / Reports</text>
  </g>

  <!-- Bottom Core Tech Badges / Title -->
  <rect x="230" y="235" width="340" height="28" rx="6" fill="#1e293b" opacity="0.8" stroke="#334155" stroke-width="1"/>
  <text class="title-text" x="400" y="253" style="font-size: 11px; fill: #60a5fa; letter-spacing: 2px;">PYTHON • PYSPARK • ETL • SYNAPSE • SQL</text>

</svg>
